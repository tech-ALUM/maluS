{% extends "base.html" %}
{% block title %}Change password — maluS{% endblock %}
{% block content %}
<section class="card auth">
  <h1>Change your password</h1>
  {% if user.must_change_password %}<p class="muted">Set a new password to continue.</p>{% endif %}
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/ui/account/password" class="stack">
    <label>Current password <input name="current" type="password" autocomplete="current-password" required></label>
    <label>New password <input name="new_password" type="password" autocomplete="new-password" required></label>
    <button class="primary">Change password</button>
  </form>
</section>
{% endblock %}
