# maluS v1 — app + Caddy (TLS) (+ optional Postgres).
# `docker compose up -d` brings up the app behind Caddy on 80/443.
# The app is published only on loopback; Caddy reaches it over the compose network.
services:
  app:
    build: .
    env_file: .env
    environment:
      # SQLite lives on the persistent volume by default; override in .env for Postgres.
      MALUS_DB_URL: ${MALUS_DB_URL:-sqlite:////data/malus.db}
    volumes:
      - malus-data:/data
    ports:
      - "127.0.0.1:8000:8000"  # loopback only (local debugging); NOT public
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    environment:
      MALUS_DOMAIN: ${MALUS_DOMAIN:-malus.example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # ACME certificates (persist!)
      - caddy-config:/config
    restart: unless-stopped

  # Optional Postgres. Enable with:  docker compose --profile postgres up -d
  # and set MALUS_DB_URL=postgresql+psycopg://malus:...@db:5432/malus in .env
  # (install the driver: build the app image with the [postgres] extra — see the runbook).
  db:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-malus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-malus}
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  malus-data:
  pg-data:
  caddy-data:
  caddy-config:
